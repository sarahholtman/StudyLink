<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses - StudyLink</title>
    <link rel="stylesheet" href="/css/style.css?v=2">
    <script src="/js/auth-guard.js"></script>
</head>
<body>

<header>
    <h1>StudyLink</h1>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="study-groups.html">Find Study Groups</a>
        <a href="#">Upcoming Sessions</a>
        <a href="#">Notifications</a>
    </nav>

    <div class="profile-menu">
        <button id="profileButton" class="profile-button">
            <span id="dashboardUserName">Student</span>
            <span class="profile-icon">👤</span>
        </button>

        <div id="profileDropdown" class="profile-dropdown">
            <a href="account.html">My Account</a>
            <a href="my-courses.html">My Courses</a>
            <button id="logoutButton">Logout</button>
        </div>
    </div>
</header>

<main class="container">

    <section class="card">
        <h2>My Courses</h2>
        <p>Add the courses you are currently taking so StudyLink can help match you with relevant study groups.</p>
    </section>

    <section class="dashboard-grid">

        <div class="card">
            <h2>Add Course</h2>

            <form id="courseForm">
                <label>Course Code</label>
                <input type="text" id="courseCode" placeholder="Example: CST8319" required>

                <label>School</label>
                <input type="text" id="school" placeholder="Example: Algonquin College" required>

                <label>Program</label>
                <input type="text" id="program" placeholder="Example: Computer Programming" required>

                <button type="submit">Add Course</button>
            </form>
        </div>

        <div class="card">
            <h2>My Active Courses</h2>
            <div id="courseList">
                <p>No courses added yet.</p>
            </div>
        </div>

    </section>

</main>

<script src="/js/profile-menu.js"></script>
<script src="/js/profile.js"></script>
<script>
    const userName = localStorage.getItem("userName");

    if (userName) {
        document.getElementById("dashboardUserName").textContent = userName;
    }
</script>

</body>
</html>
